<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forkboy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top,#334155,#0f172a 35%,#020617 100%);
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    text-align:center;
    padding:50px 20px;
}

h1{
    font-size:5rem;
    color:#facc15;
    text-shadow:
        0 0 20px #facc15,
        0 0 40px #facc15;
    margin-bottom:30px;
}

.hero-img{
    width:350px;
    max-width:90%;
    border-radius:25px;
    border:3px solid #facc15;
    box-shadow:
        0 0 25px rgba(250,204,21,.5),
        0 0 80px rgba(250,204,21,.3);
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.15);
}

.label{
    color:#94a3b8;
    margin-bottom:10px;
    font-size:1rem;
}

.value{
    font-size:2.2rem;
    font-weight:bold;
    color:#facc15;
}

button{
    background:linear-gradient(135deg,#facc15,#f97316);
    border:none;
    color:black;
    padding:16px 30px;
    border-radius:999px;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-3px);
}

.footer-link{
    display:block;
    margin-top:30px;
    color:#93c5fd;
    text-decoration:none;
}

.footer-link:hover{
    color:white;
}

@media(max-width:700px){

    h1{
        font-size:3rem;
    }

    .grid{
        grid-template-columns:1fr;
    }
}

</style>

</head>
<body>

<div class="container">

<h1>Forkboy</h1>

<img src="gabeljunge.jpg" class="hero-img" alt="Forkboy">

<div class="grid">

    <div class="card">
        <div class="label">Forkboy Visits</div>
        <div class="value" id="visitCounter">...</div>
    </div>

    <div class="card">
        <div class="label">Forkboy Count</div>
        <div class="value" id="voteCounter">...</div>
    </div>

</div>

<button onclick="voteForkboy()">
    Forkboy Count
</button>

<a class="footer-link" href="https://youtube.com">
    YouTube
</a>

</div>

<script>

let visits = localStorage.getItem("forkboyVisits") || 0;
visits++;
localStorage.setItem("forkboyVisits", visits);
document.getElementById("visitCounter").textContent = visits;

let votes = localStorage.getItem("forkboyVotes") || 0;
document.getElementById("voteCounter").textContent = votes;

function voteForkboy() {

    votes++;

    localStorage.setItem("forkboyVotes", votes);

    document.getElementById("voteCounter").textContent = votes;
}

</script>

</body>
</html>
