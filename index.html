<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forkboy</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at top, #334155, #020617 65%);
    color: white;
    font-family: Segoe UI, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrapper {
    width: 92%;
    max-width: 650px;
    text-align: center;
    padding: 40px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(14px);
}

img {
    width: 260px;
    max-width: 85%;
    border-radius: 24px;
    box-shadow: 0 0 45px rgba(250, 204, 21, 0.35);
    margin-bottom: 30px;
}

h1 {
    font-size: 4.5rem;
    color: #facc15;
    text-shadow: 0 0 22px rgba(250, 204, 21, 0.8);
    margin-bottom: 20px;
}

.counter-box {
    margin: 25px auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.counter {
    padding: 22px;
    border-radius: 18px;
    background: rgba(15, 23, 42, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.12);
}

.label {
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 8px;
}

.value {
    font-size: 2.2rem;
    font-weight: 700;
    color: #facc15;
}

button {
    margin-top: 10px;
    padding: 16px 34px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #facc15, #f97316);
    color: #111827;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(249, 115, 22, 0.35);
    transition: 0.2s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 38px rgba(249, 115, 22, 0.5);
}

a {
    display: inline-block;
    margin-top: 20px;
    color: #93c5fd;
    text-decoration: none;
}

a:hover {
    color: #bfdbfe;
}

@media (max-width: 600px) {
    h1 {
        font-size: 3rem;
    }

    .counter-box {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    gabeljunge.jpg

    <h1>Forkboy</h1>

    <div class="counter-box">
        <div class="counter">
            <div class="label">Forkboy</div>
            <div class="value" id="visitCounter">...</div>
        </div>

        <div class="counter">
            <div class="label">Forkboy</div>
            <div class="value" id="voteCounter">...</div>
        </div>
    </div>

    <button onclick="voteForkboy()">Forkboy</button>

    <br>

    https://www.youtube.comForkboy</a>

</div>

<script>
const apiBase = "https://countapi.mileshilliard.com/api/v1";
const visitKey = "rickhub96-forkboy-visits";
const voteKey = "rickhub96-forkboy-votes";

async function incrementVisits() {
    try {
        const response = await fetch(`${apiBase}/hit/${visitKey}`);
        const data = await response.json();
        document.getElementById("visitCounter").textContent = data.value;
    } catch {
        document.getElementById("visitCounter").textContent = "error";
    }
}

async function loadVotes() {
    try {
        const response = await fetch(`${apiBase}/get/${voteKey}`);
        const data = await response.json();
        document.getElementById("voteCounter").textContent = data.value;
    } catch {
        document.getElementById("voteCounter").textContent = "0";
    }
}

async function voteForkboy() {
    try {
        const response = await fetch(`${apiBase}/hit/${voteKey}`);
        const data = await response.json();
        document.getElementById("voteCounter").textContent = data.value;
    } catch {
        document.getElementById("voteCounter").textContent = "error";
    }
}

incrementVisits();
loadVotes();
</script>

</body>
</html>
