<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabeljunge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
    min-height:100vh;
}

.hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
}

.hero img{
    width:300px;
    max-width:90%;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,255,255,.2);
}

h1{
    font-size:5rem;
    margin:30px 0;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

.card{
    margin-top:20px;
    padding:25px;
    background:rgba(255,255,255,.05);
    border-radius:15px;
    width:500px;
    max-width:90%;
    backdrop-filter:blur(10px);
}

button{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:1rem;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="hero">

<img src="gabeljunge.jpg" alt="Gabeljunge">

<h1>Gabeljunge</h1>

<div class="card">
Forkboy
</div>

<a href="https://ageofempires.fandom.com/wiki/Forkboy">
<button>Forkboy</button>
</a>

</div>

</body>
</html>
