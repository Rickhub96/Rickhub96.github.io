<script src="assets/js/main.js"></script>
<script>
  // Kleines Easter Egg: der Gabeljunge folgt der Maus
  const fork = document.getElementById("follow-fork");
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let fx = mx, fy = my;
  window.addEventListener("mousemove", (e) => { mx = e.clientX; my = e.clientY; });
  function follow() {
    fx += (mx - fx) * 0.08;
    fy += (my - fy) * 0.08;
    fork.style.transform = `translate(${fx - 45}px, ${fy - 45}px)`;
    requestAnimationFrame(follow);
  }
  if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) follow();
</script>
